<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Видеозвонки</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="center-screen">
        <div class="container">
            <h1>🎥 Вход</h1>
            
            <div id="error" class="notification error"></div>
            <div id="success" class="notification success"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">📧 Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Введите ваш email">
                </div>
                
                <div class="form-group">
                    <label for="password">🔒 Пароль:</label>
                    <input type="password" id="password" name="password" required placeholder="Введите пароль">
                </div>
                
                <button type="submit" id="submitBtn">
                    <span id="submitText">🚀 Войти</span>
                </button>
            </form>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Вход в систему...</p>
            </div>
            
            <div class="link">
                <p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="userCount">-</div>
                    <div class="stat-label">Пользователей</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="roomCount">-</div>
                    <div class="stat-label">Комнат создано</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const submitBtn = document.getElementById('submitBtn');
        const submitText = document.getElementById('submitText');
        const loading = document.getElementById('loading');

        // Загружаем статистику
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                if (response.ok) {
                    const stats = await response.json();
                    document.getElementById('userCount').textContent = stats.users || '0';
                    document.getElementById('roomCount').textContent = stats.rooms || '0';
                }
            } catch (error) {
                console.log('Не удалось загрузить статистику');
            }
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            successDiv.classList.remove('show');
            
            // Автоматически скрываем через 5 секунд
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.classList.add('show');
            errorDiv.classList.remove('show');
        }

        function hideMessages() {
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
        }

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                submitText.textContent = '⏳ Вход...';
                loading.classList.add('show');
                form.style.opacity = '0.7';
            } else {
                submitBtn.disabled = false;
                submitText.textContent = '🚀 Войти';
                loading.classList.remove('show');
                form.style.opacity = '1';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();
            
            const formData = new FormData(form);
            const data = {
                email: formData.get('email').trim(),
                password: formData.get('password')
            };

            // Простая валидация
            if (!data.email || !data.password) {
                showError('Пожалуйста, заполните все поля');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showSuccess(`🎉 Добро пожаловать обратно! Перенаправление...`);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    setLoading(false);
                    showError(result.error || 'Ошибка входа');
                }
            } catch (error) {
                setLoading(false);
                showError('Ошибка сети. Проверьте подключение и попробуйте еще раз.');
            }
        });

        // Автофокус на первое поле
        document.getElementById('email').focus();
        
        // Загружаем статистику при загрузке страницы
        loadStats();
    </script>
</body>
</html>
