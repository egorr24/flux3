<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест загрузки скриптов</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Тест загрузки JavaScript файлов</h1>
    <div id="status"></div>
    
    <script>
        function addStatus(message, isError = false) {
            const status = document.getElementById('status');
            const div = document.createElement('div');
            div.className = `status ${isError ? 'error' : 'success'}`;
            div.textContent = message;
            status.appendChild(div);
            console.log(message);
        }
        
        addStatus('HTML загружен');
    </script>
    
    <script src="/socket.io/socket.io.js" 
            onload="addStatus('Socket.IO загружен успешно')" 
            onerror="addStatus('Ошибка загрузки Socket.IO', true)">
    </script>
    
    <script>
        if (typeof io !== 'undefined') {
            addStatus('Socket.IO доступен');
        } else {
            addStatus('Socket.IO недоступен', true);
        }
    </script>
    
    <script src="call-test.js" 
            onload="addStatus('call-test.js загружен успешно')" 
            onerror="addStatus('Ошибка загрузки call-test.js', true)">
    </script>
    
    <script src="call.js" 
            onload="addStatus('call.js загружен успешно')" 
            onerror="addStatus('Ошибка загрузки call.js', true)">
    </script>
</body>
</html>
