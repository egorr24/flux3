<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеозвонок</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body style="background: #1a1a1a; color: white; overflow: hidden;">
    <div class="video-header">
        <div>
            <h1 style="margin: 0; font-size: 1.5rem;">🎥 Видеозвонок</h1>
            <span style="font-size: 0.9rem; opacity: 0.8;">Комната: <code id="roomId" style="background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 4px;"></code></span>
        </div>
        <div class="user-info" style="color: white;">
            <span id="currentUser"></span>
            <button onclick="logout()" class="btn-danger btn-small">Выйти</button>
        </div>
    </div>

    <div class="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline style="display: none;"></video>
        <div id="waiting" class="waiting">
            <div style="margin-bottom: 1rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">📹</div>
                <div style="font-size: 1.5rem; margin-bottom: 0.5rem;">Ожидание подключения...</div>
                <div style="font-size: 1rem; opacity: 0.7;">Поделитесь ссылкой с друзьями для начала звонка</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="videoBtn" class="control-btn" title="Камера">📹</button>
        <button id="audioBtn" class="control-btn" title="Микрофон">🎤</button>
        <button id="shareBtn" class="control-btn" title="Демонстрация экрана">🖥️</button>
        <button id="copyBtn" class="control-btn" title="Скопировать ссылку">🔗</button>
        <button id="endBtn" class="control-btn end" title="Завершить звонок">📞</button>
    </div>

    <div id="notification" class="fixed-notification"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Глобальные переменные
        let socket;
        let localStream;
        let remoteStream;
        let peerConnection;
        let roomId;
        let isVideoOn = true;
        let isAudioOn = true;

        // WebRTC конфигурация
        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // Получаем ID комнаты из URL
        roomId = window.location.pathname.split('/call/')[1];
        document.getElementById('roomId').textContent = roomId;

        // Инициализация
        async function init() {
            try {
                // Загружаем информацию о пользователе (опционально)
                try {
                    const userResponse = await fetch('/api/user');
                    const user = await userResponse.json();
                    
                    if (user.isAuthenticated) {
                        document.getElementById('currentUser').textContent = user.username;
                        document.querySelector('.user-info').style.display = 'flex';
                    } else {
                        document.getElementById('currentUser').textContent = 'Гость';
                        document.querySelector('.user-info').style.display = 'none';
                    }
                } catch (error) {
                    console.log('Работаем в демо режиме');
                    document.getElementById('currentUser').textContent = 'Демо';
                    document.querySelector('.user-info').style.display = 'none';
                }

                // Получаем доступ к камере и микрофону
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720 },
                    audio: { echoCancellation: true, noiseSuppression: true }
                });
                
                document.getElementById('localVideo').srcObject = localStream;
                
                // Подключаемся к серверу
                socket = io();
                
                // Присоединяемся к комнате
                const userId = Math.random().toString(36).substring(2, 15);
                socket.emit('join-room', roomId, userId);
                
                setupSocketEvents();
                setupControls();
                
                showNotification('🎉 Подключено к комнате! Поделитесь ссылкой для начала звонка.', 'success');
                
            } catch (error) {
                console.error('Ошибка:', error);
                showNotification('❌ Ошибка доступа к камере/микрофону. Проверьте разрешения браузера.', 'error');
            }
        }

        // Выход из системы
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                console.error('Ошибка выхода:', error);
                window.location.href = '/login';
            }
        }

        // Настройка Socket.IO событий
        function setupSocketEvents() {
            socket.on('user-connected', async (userId) => {
                console.log('Пользователь подключился:', userId);
                showNotification('👤 Пользователь присоединился к звонку!', 'success');
                await createPeerConnection(userId, true);
            });

            socket.on('user-disconnected', (userId) => {
                console.log('Пользователь отключился:', userId);
                showNotification('👋 Пользователь покинул звонок', 'warning');
                document.getElementById('remoteVideo').style.display = 'none';
                document.getElementById('waiting').style.display = 'block';
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
            });

            socket.on('signal', async (data) => {
                if (data.signal.type === 'offer') {
                    await handleOffer(data.signal, data.from);
                } else if (data.signal.type === 'answer') {
                    await handleAnswer(data.signal);
                } else if (data.signal.candidate) {
                    await handleIceCandidate(data.signal);
                }
            });

            socket.on('room-users', (users) => {
                console.log('Пользователи в комнате:', users);
                if (users.length > 0) {
                    // Подключаемся к первому пользователю
                    createPeerConnection(users[0], true);
                }
            });
        }

        // Создание WebRTC соединения
        async function createPeerConnection(userId, isInitiator) {
            peerConnection = new RTCPeerConnection(config);
            
            // Добавляем локальный поток
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            // Обрабатываем удаленный поток
            peerConnection.ontrack = (event) => {
                remoteStream = event.streams[0];
                const remoteVideo = document.getElementById('remoteVideo');
                remoteVideo.srcObject = remoteStream;
                remoteVideo.style.display = 'block';
                document.getElementById('waiting').style.display = 'none';
                showNotification('🎥 Видеосвязь установлена!', 'success');
            };

            // Обрабатываем ICE кандидатов
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('signal', {
                        roomId: roomId,
                        signal: event.candidate,
                        to: userId
                    });
                }
            };

            // Если мы инициаторы, создаем offer
            if (isInitiator) {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                socket.emit('signal', {
                    roomId: roomId,
                    signal: offer,
                    to: userId
                });
            }
        }

        // Обработка offer
        async function handleOffer(offer, senderId) {
            await createPeerConnection(senderId, false);
            await peerConnection.setRemoteDescription(offer);
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            socket.emit('signal', {
                roomId: roomId,
                signal: answer,
                to: senderId
            });
        }

        // Обработка answer
        async function handleAnswer(answer) {
            await peerConnection.setRemoteDescription(answer);
        }

        // Обработка ICE кандидата
        async function handleIceCandidate(candidate) {
            await peerConnection.addIceCandidate(candidate);
        }

        // Настройка контролов
        function setupControls() {
            document.getElementById('videoBtn').onclick = toggleVideo;
            document.getElementById('audioBtn').onclick = toggleAudio;
            document.getElementById('shareBtn').onclick = shareScreen;
            document.getElementById('copyBtn').onclick = copyLink;
            document.getElementById('endBtn').onclick = endCall;
        }

        // Переключение видео
        function toggleVideo() {
            isVideoOn = !isVideoOn;
            localStream.getVideoTracks()[0].enabled = isVideoOn;
            
            const btn = document.getElementById('videoBtn');
            btn.classList.toggle('off', !isVideoOn);
            btn.textContent = isVideoOn ? '📹' : '📹';
            btn.style.opacity = isVideoOn ? '1' : '0.5';
            
            showNotification(isVideoOn ? '📹 Камера включена' : '📹 Камера выключена', 'success');
        }

        // Переключение аудио
        function toggleAudio() {
            isAudioOn = !isAudioOn;
            localStream.getAudioTracks()[0].enabled = isAudioOn;
            
            const btn = document.getElementById('audioBtn');
            btn.classList.toggle('off', !isAudioOn);
            btn.textContent = isAudioOn ? '🎤' : '🔇';
            btn.style.opacity = isAudioOn ? '1' : '0.5';
            
            showNotification(isAudioOn ? '🎤 Микрофон включен' : '🔇 Микрофон выключен', 'success');
        }

        // Демонстрация экрана
        async function shareScreen() {
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: true,
                    audio: true
                });
                
                const videoTrack = screenStream.getVideoTracks()[0];
                const sender = peerConnection.getSenders().find(s => 
                    s.track && s.track.kind === 'video'
                );
                
                if (sender) {
                    await sender.replaceTrack(videoTrack);
                }
                
                document.getElementById('localVideo').srcObject = screenStream;
                showNotification('🖥️ Демонстрация экрана начата', 'success');
                
                videoTrack.onended = () => {
                    document.getElementById('localVideo').srcObject = localStream;
                    if (sender) {
                        sender.replaceTrack(localStream.getVideoTracks()[0]);
                    }
                    showNotification('🖥️ Демонстрация экрана завершена', 'success');
                };
                
            } catch (error) {
                console.error('Ошибка демонстрации экрана:', error);
                showNotification('❌ Ошибка демонстрации экрана', 'error');
            }
        }

        // Копирование ссылки
        async function copyLink() {
            const link = window.location.href;
            try {
                await navigator.clipboard.writeText(link);
                showNotification('🔗 Ссылка скопирована в буфер обмена!', 'success');
            } catch (error) {
                // Fallback для старых браузеров
                const textArea = document.createElement('textarea');
                textArea.value = link;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showNotification('🔗 Ссылка скопирована!', 'success');
            }
        }

        // Завершение звонка
        function endCall() {
            if (confirm('Завершить звонок?')) {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                if (peerConnection) {
                    peerConnection.close();
                }
                if (socket) {
                    socket.disconnect();
                }
                window.location.href = '/';
            }
        }

        // Показ уведомлений
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `fixed-notification notification ${type} show`;
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 4000);
        }

        // Обработка горячих клавиш
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyM') {
                toggleAudio();
            } else if (e.code === 'KeyV') {
                toggleVideo();
            } else if (e.code === 'KeyS') {
                shareScreen();
            } else if (e.code === 'KeyC') {
                copyLink();
            } else if (e.code === 'Escape') {
                endCall();
            }
        });

        // Запуск приложения
        init();
    </script>
</body>
</html>
