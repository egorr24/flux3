<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеозвонок</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="call-container">
        <header class="call-header">
            <h1>Видеозвонок</h1>
            <div class="room-info">
                <span>Комната: <span id="currentRoomId"></span></span>
            </div>
        </header>

        <main class="call-main">
            <div class="video-container">
                <video id="localVideo" autoplay muted playsinline></video>
                <div id="remoteVideos"></div>
            </div>

            <div class="controls">
                <button id="toggleVideo" class="control-btn video-on" title="Включить/выключить камеру">
                    📹
                </button>
                <button id="toggleAudio" class="control-btn audio-on" title="Включить/выключить микрофон">
                    🎤
                </button>
                <button id="shareScreen" class="control-btn" title="Демонстрация экрана">
                    🖥️
                </button>
                <button id="copyRoomLink" class="control-btn" title="Копировать ссылку на комнату">
                    🔗
                </button>
                <button id="endCall" class="control-btn end-call" title="Завершить звонок">
                    📞
                </button>
            </div>
        </main>

        <div id="participants">
            <h3>Участники (<span id="participantCount">1</span>)</h3>
            <div id="participantList">
                <div class="participant">Вы</div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification hidden"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Проверка загрузки Socket.IO
        if (typeof io === 'undefined') {
            console.error('Socket.IO не загружен!');
            document.body.innerHTML += '<div style="position:fixed;top:0;left:0;background:red;color:white;padding:10px;z-index:9999;">Ошибка: Socket.IO не загружен</div>';
        } else {
            console.log('Socket.IO загружен успешно');
        }
    </script>
    <script type="text/javascript" src="call.js" onerror="console.error('Ошибка загрузки call.js'); document.body.innerHTML += '<div style=\'position:fixed;top:50px;left:0;background:red;color:white;padding:10px;z-index:9999;\'>Ошибка загрузки call.js</div>';"></script>
</body>
</html>
