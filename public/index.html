<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеозвонки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            background: white; 
            padding: 2rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
            color: #666;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            width: auto;
            margin-bottom: 0;
        }
        .logout-btn:hover {
            background: #c82333;
        }
        h1 { 
            color: #333; 
            margin: 0;
        }
        .card { margin-bottom: 1.5rem; }
        .card h2 { margin-bottom: 1rem; color: #555; font-size: 1.2rem; }
        button { 
            background: #667eea; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1rem;
            width: 100%;
            margin-bottom: 10px;
        }
        button:hover { background: #5a6fd8; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            margin-bottom: 10px;
            font-size: 1rem;
        }
        .room-info { 
            background: #f8f9fa; 
            padding: 1rem; 
            border-radius: 8px; 
            margin: 1rem 0;
            display: none;
        }
        .link-container { display: flex; gap: 10px; margin-top: 10px; }
        .link-container input { margin-bottom: 0; flex: 1; }
        .link-container button { width: auto; margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎥 Видеозвонки</h1>
            <div class="user-info">
                <span>Привет, <span id="username"></span>!</span>
                <button onclick="logout()" class="logout-btn">Выйти</button>
            </div>
        </div>
        
        <div class="card">
            <h2>Создать новый звонок</h2>
            <button onclick="createRoom()">📞 Создать комнату</button>
        </div>

        <div class="card">
            <h2>Присоединиться к звонку</h2>
            <input type="text" id="roomInput" placeholder="Введите ID комнаты">
            <button onclick="joinRoom()">🚪 Войти</button>
        </div>

        <div id="roomInfo" class="room-info">
            <h2>Ваша комната создана!</h2>
            <p><strong>ID комнаты:</strong> <span id="roomId"></span></p>
            <p><strong>Ссылка для приглашения:</strong></p>
            <div class="link-container">
                <input type="text" id="roomLink" readonly>
                <button onclick="copyLink()">📋 Копировать</button>
            </div>
            <button onclick="startCall()" style="margin-top: 15px;">🎥 Начать звонок</button>
        </div>
    </div>

    <script>
        let currentUser = null;

        // Загружаем информацию о пользователе
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/user');
                const user = await response.json();
                
                if (user.isAuthenticated) {
                    currentUser = user;
                    document.getElementById('username').textContent = user.username;
                    document.querySelector('.user-info').style.display = 'flex';
                } else {
                    // Работаем в демо режиме без авторизации
                    document.querySelector('.user-info').style.display = 'none';
                    document.querySelector('.header h1').textContent = '🎥 Видеозвонки (Демо)';
                    
                    if (user.error) {
                        console.log('Демо режим:', user.error);
                    }
                }
            } catch (error) {
                console.error('Ошибка загрузки пользователя:', error);
                // Продолжаем работу в демо режиме
                document.querySelector('.user-info').style.display = 'none';
                document.querySelector('.header h1').textContent = '🎥 Видеозвонки (Демо)';
            }
        }

        // Выход из системы
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                console.error('Ошибка выхода:', error);
                window.location.href = '/login';
            }
        }

        function generateRoomId() {
            return Math.random().toString(36).substring(2, 15);
        }

        function createRoom() {
            fetch('/api/create-room', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('roomId').textContent = data.roomId;
                    document.getElementById('roomLink').value = data.roomLink;
                    document.getElementById('roomInfo').style.display = 'block';
                    
                    localStorage.setItem('currentRoomId', data.roomId);
                } else {
                    // Fallback для демо режима
                    const roomId = generateRoomId();
                    const roomLink = window.location.origin + '/call/' + roomId;
                    
                    document.getElementById('roomId').textContent = roomId;
                    document.getElementById('roomLink').value = roomLink;
                    document.getElementById('roomInfo').style.display = 'block';
                    
                    localStorage.setItem('currentRoomId', roomId);
                }
            })
            .catch(error => {
                console.error('Ошибка API, используем локальную генерацию:', error);
                
                // Fallback для демо режима
                const roomId = generateRoomId();
                const roomLink = window.location.origin + '/call/' + roomId;
                
                document.getElementById('roomId').textContent = roomId;
                document.getElementById('roomLink').value = roomLink;
                document.getElementById('roomInfo').style.display = 'block';
                
                localStorage.setItem('currentRoomId', roomId);
            });
        }

        function generateRoomId() {
            return Math.random().toString(36).substring(2, 15);
        }

        function joinRoom() {
            const roomId = document.getElementById('roomInput').value.trim();
            if (roomId) {
                window.location.href = '/call/' + roomId;
            } else {
                alert('Введите ID комнаты');
            }
        }

        function copyLink() {
            const linkInput = document.getElementById('roomLink');
            linkInput.select();
            document.execCommand('copy');
            alert('Ссылка скопирована!');
        }

        function startCall() {
            const roomId = localStorage.getItem('currentRoomId');
            if (roomId) {
                window.location.href = '/call/' + roomId;
            }
        }

        document.getElementById('roomInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                joinRoom();
            }
        });

        // Загружаем информацию о пользователе при загрузке страницы
        loadUserInfo();
    </script>
</body>
</html>
