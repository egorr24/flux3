<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Видеозвонки</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="center-screen">
        <div class="container">
            <h1>📝 Регистрация</h1>
            
            <div id="error" class="notification error"></div>
            <div id="success" class="notification success"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">👤 Имя пользователя:</label>
                    <input type="text" id="username" name="username" required minlength="3" maxlength="20" placeholder="Введите имя пользователя">
                    <div class="password-strength" id="usernameHelp">От 3 до 20 символов, только буквы и цифры</div>
                </div>
                
                <div class="form-group">
                    <label for="email">📧 Email:</label>
                    <input type="email" id="email" name="email" required placeholder="example@mail.com">
                    <div class="password-strength" id="emailHelp">Используется для входа в систему</div>
                </div>
                
                <div class="form-group">
                    <label for="password">🔒 Пароль:</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="Минимум 6 символов">
                    <div class="password-strength" id="passwordStrength">Минимум 6 символов</div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">🔒 Подтвердите пароль:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Повторите пароль">
                    <div class="password-strength" id="confirmHelp"></div>
                </div>
                
                <button type="submit" id="submitBtn">
                    <span id="submitText">🚀 Зарегистрироваться</span>
                </button>
            </form>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Создание аккаунта...</p>
            </div>
            
            <div class="link">
                <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="userCount">-</div>
                    <div class="stat-label">Пользователей</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="roomCount">-</div>
                    <div class="stat-label">Комнат создано</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const submitBtn = document.getElementById('submitBtn');
        const submitText = document.getElementById('submitText');
        const loading = document.getElementById('loading');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordStrength = document.getElementById('passwordStrength');
        const confirmHelp = document.getElementById('confirmHelp');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');

        // Загружаем статистику
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                if (response.ok) {
                    const stats = await response.json();
                    document.getElementById('userCount').textContent = stats.users || '0';
                    document.getElementById('roomCount').textContent = stats.rooms || '0';
                }
            } catch (error) {
                console.log('Не удалось загрузить статистику');
            }
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            successDiv.classList.remove('show');
            
            // Автоматически скрываем через 5 секунд
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.classList.add('show');
            errorDiv.classList.remove('show');
        }

        function hideMessages() {
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
        }

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                submitText.textContent = '⏳ Регистрация...';
                loading.classList.add('show');
                form.style.opacity = '0.7';
            } else {
                submitBtn.disabled = false;
                submitText.textContent = '🚀 Зарегистрироваться';
                loading.classList.remove('show');
                form.style.opacity = '1';
            }
        }

        function checkPasswordStrength(password) {
            if (password.length < 6) {
                passwordStrength.textContent = 'Слишком короткий пароль';
                passwordStrength.className = 'password-strength strength-weak';
                return false;
            } else if (password.length < 8) {
                passwordStrength.textContent = 'Слабый пароль - добавьте символы';
                passwordStrength.className = 'password-strength strength-weak';
                return true;
            } else if (password.length < 12) {
                passwordStrength.textContent = 'Средний пароль - хорошо!';
                passwordStrength.className = 'password-strength strength-medium';
                return true;
            } else {
                passwordStrength.textContent = 'Сильный пароль - отлично!';
                passwordStrength.className = 'password-strength strength-strong';
                return true;
            }
        }

        function checkPasswordMatch() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (confirmPassword === '') {
                confirmHelp.textContent = '';
                confirmPasswordInput.classList.remove('invalid');
                return true;
            }
            
            if (password === confirmPassword) {
                confirmHelp.textContent = '✅ Пароли совпадают';
                confirmHelp.className = 'password-strength strength-strong';
                confirmPasswordInput.classList.remove('invalid');
                return true;
            } else {
                confirmHelp.textContent = '❌ Пароли не совпадают';
                confirmHelp.className = 'password-strength strength-weak';
                confirmPasswordInput.classList.add('invalid');
                return false;
            }
        }

        function validateUsername(username) {
            const usernameHelp = document.getElementById('usernameHelp');
            
            if (username.length < 3) {
                usernameHelp.textContent = 'Слишком короткое имя (минимум 3 символа)';
                usernameHelp.className = 'password-strength strength-weak';
                usernameInput.classList.add('invalid');
                return false;
            } else if (username.length > 20) {
                usernameHelp.textContent = 'Слишком длинное имя (максимум 20 символов)';
                usernameHelp.className = 'password-strength strength-weak';
                usernameInput.classList.add('invalid');
                return false;
            } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                usernameHelp.textContent = 'Только буквы, цифры и подчеркивание';
                usernameHelp.className = 'password-strength strength-weak';
                usernameInput.classList.add('invalid');
                return false;
            } else {
                usernameHelp.textContent = '✅ Отличное имя пользователя!';
                usernameHelp.className = 'password-strength strength-strong';
                usernameInput.classList.remove('invalid');
                return true;
            }
        }

        function validateEmail(email) {
            const emailHelp = document.getElementById('emailHelp');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!emailRegex.test(email)) {
                emailHelp.textContent = '❌ Неверный формат email';
                emailHelp.className = 'password-strength strength-weak';
                emailInput.classList.add('invalid');
                return false;
            } else {
                emailHelp.textContent = '✅ Email корректный';
                emailHelp.className = 'password-strength strength-strong';
                emailInput.classList.remove('invalid');
                return true;
            }
        }

        // Обработчики событий
        passwordInput.addEventListener('input', () => {
            checkPasswordStrength(passwordInput.value);
            checkPasswordMatch();
        });

        confirmPasswordInput.addEventListener('input', checkPasswordMatch);

        usernameInput.addEventListener('input', () => {
            validateUsername(usernameInput.value);
        });

        emailInput.addEventListener('input', () => {
            if (emailInput.value) {
                validateEmail(emailInput.value);
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const formData = new FormData(form);
            const data = {
                username: formData.get('username').trim(),
                email: formData.get('email').trim(),
                password: formData.get('password'),
                confirmPassword: formData.get('confirmPassword')
            };

            // Валидация на клиенте
            let isValid = true;

            if (!validateUsername(data.username)) isValid = false;
            if (!validateEmail(data.email)) isValid = false;
            if (!checkPasswordStrength(data.password)) isValid = false;
            if (!checkPasswordMatch()) isValid = false;

            if (data.password !== data.confirmPassword) {
                showError('Пароли не совпадают');
                return;
            }

            if (!isValid) {
                showError('Пожалуйста, исправьте ошибки в форме');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showSuccess(`🎉 Добро пожаловать, ${data.username}! Перенаправление...`);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    setLoading(false);
                    showError(result.error || 'Ошибка регистрации');
                }
            } catch (error) {
                setLoading(false);
                showError('Ошибка сети. Проверьте подключение и попробуйте еще раз.');
            }
        });

        // Автофокус на первое поле
        document.getElementById('username').focus();
        
        // Загружаем статистику при загрузке страницы
        loadStats();
    </script>
</body>
</html>
